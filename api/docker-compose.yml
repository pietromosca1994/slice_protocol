version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: securitization-api:latest
    container_name: securitization-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV:                    production
      PORT:                        3000
      LOG_LEVEL:                   ${LOG_LEVEL:-info}
      IOTA_NETWORK:                ${IOTA_NETWORK:-testnet}
      IOTA_RPC_URL:                ${IOTA_RPC_URL:-}
      SPV_REGISTRY_ID:             ${SPV_REGISTRY_ID}
      SPV_PACKAGE_ID:              ${SPV_PACKAGE_ID}
      SECURITIZATION_PACKAGE_ID:   ${SECURITIZATION_PACKAGE_ID}
      ADMIN_SECRET_KEY:            ${ADMIN_SECRET_KEY:-}
      GAS_BUDGET:                  ${GAS_BUDGET:-100000000}
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout:  5s
      retries:  3

  # Optional: nginx reverse proxy for TLS termination
  # nginx:
